services:
  postgres:
    image: postgres:15-alpine
    container_name: ai-backend-postgres
    environment:
      POSTGRES_USER: chatblix
      POSTGRES_PASSWORD: chatblix123
      POSTGRES_DB: chatblix
    ports:
      - '5432:5432'
    volumes:
      - ai_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U chatblix -d chatblix']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ai-backend-redis
    ports:
      - '6380:6379'
    volumes:
      - ai_redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  ai_postgres_data:
  ai_redis_data:
