services:
  postgres:
    image: postgres:15-alpine
    container_name: nest-backend-postgres
    environment:
      POSTGRES_USER: chatblix
      POSTGRES_PASSWORD: chatblix123
      POSTGRES_DB: chatblix
    ports:
      - '5432:5432'
    volumes:
      - nest_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U chatblix -d chatblix']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  nest_postgres_data:
