services:
  # ai-backend's own Redis — prompt cache, profile cache, request dedupe
  # No PostgreSQL — ai-backend is fully stateless (no database)
  redis:
    image: redis:7-alpine
    container_name: ai-backend-redis
    ports:
      - '6380:6379'
    volumes:
      - ai_redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    
volumes:
  ai_redis_data:
